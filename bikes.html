<!DOCTYPE html>
<html>

<head>
  <script type="text/javascript" src="KTM-Script.js"></script>

  <link rel="icon" type="image/x-icon" href="logo.png" />
  <link rel="stylesheet" href="ktm.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body>
  <header class="navbar" id="navbar">
    <img src="KTM-logo.png" id="logo" />
    <a href="KTM.html">HOME</a>
    <a href="bikes.html" id="active">BIKES</a>
    <a href="racing.html">RACING</a>
    <a href="contact.html">CONTACT</a>
  </header>

  <div class="row">
    <div class="column">
      <img src="etb/Enduro.png" style="width: 8%;" id="enduro"onclick="myFunction(this),enduroClick();">
    </div>
  
    <div class="column">
      <img src="etb/Sport-touring.png" style="width: 8%;" id="sport"onclick="myFunction(this);">
    </div>
    <div class="column">
      <img src="etb/Supermoto.png"style="width: 8%;" id="supermoto"onclick="myFunction(this);">
    </div>
    <div class="column">
      <img src="etb/1390o1.png" style="width: 8%;" id="duke" onclick="myFunction(this);">
    </div>
    <div class="column">
      <img src="etb/RC.png" style="width: 8%;" id="rc" onclick="myFunction(this);">
    </div>
    <div class="column">
      <img src="etb/Brabus.png" style="width: 8%;" id="brabus" onclick="myFunction(this);">
    </div>
  </div>


  <div class="container">
    <span onclick="this.parentElement.style.display='none'" class="closebtn">&times;</span>
    <img id="expandedImg" width="70%">
    <div id="imgtext"></div>
    <h1 id="text"></h1>
  </div>

  <script>
    function myFunction(imgs) {
      var expandImg = document.getElementById("expandedImg");
      var imgText = document.getElementById("imgtext");
      expandImg.src = imgs.src;
      imgText.innerHTML = imgs.alt;
      expandImg.parentElement.style.display = "block";
    }
  </script>


  <footer class="footer">

          <ion-icon name="logo-facebook"></ion-icon>
        </a></li>
      <li class="social-icon__item"><a class="social-icon__link" href="https://twitter.com/KTM_Racing">
          <ion-icon name="logo-twitter"></ion-icon>
        </a></li>
      <li class="social-icon__item"><a class="social-icon__link" href="https://www.instagram.com/ktm_official/">
          <ion-icon name="logo-instagram"></ion-icon>
